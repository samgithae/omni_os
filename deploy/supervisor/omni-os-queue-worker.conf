[program:omni-os-queue-worker]
directory=/srv/omni_os
command=/usr/bin/php artisan queue:work redis --sleep=3 --tries=1 --max-time=3600 --timeout=120
process_name=%(program_name)s_%(process_num)02d
numprocs=2
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/omni-os-queue-worker.log
stopwaitsecs=3600
